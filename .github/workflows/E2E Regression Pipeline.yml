name: E2E Regression
on:
  push:
    branches:
    - master
  pull_request:
    branches:
    - master
  schedule:
    - cron: '00 21 * * *'
  workflow_dispatch:

env:
   TARGET: "%regex[.*Tests.*],com.automationexercises.tests.**.**,com.automationexercises.tests.**"
jobs:
     Chrome_Linux_Test:
       runs-on: ubuntu-latest
       permissions:
         checks: write
       steps:
         - name: Checkout code
           uses: actions/checkout@v6
         - name: Setup Java
           uses: actions/setup-java@v5
           with:
             distribution: 'zulu' # See 'Supported distributions' for available options
             java-version: '25'

         - name: Set up Maven
           uses: stCarolas/setup-maven@v5
           with:
            maven-version: 3.9.16

         - name: Running Tests
           run: mvn test -Dtest="${TARGET}" -DexecutionType="localHeadless" -DbrowserType="Chrome" clean test

         - name: Upload Test Results
           uses: actions/upload-artifact@v7
           with:
                name: Chrome_Linux_Report
                path: "test-output/reports/*.html"

     Edge_Windows_Test:
       runs-on: windows-latest
       permissions:
         checks: write
       steps:
         - name: Checkout code
           uses: actions/checkout@v6
         - name: Setup Java
           uses: actions/setup-java@v5
           with:
             distribution: 'zulu' # See 'Supported distributions' for available options
             java-version: '25'

         - name: Set up Maven
           uses: stCarolas/setup-maven@v5
           with:
             maven-version: 3.9.16

         - name: Running Tests
           run: mvn test -Dtest="${TARGET}" -DexecutionType="localHeadless" -DbrowserType="Edge" clean test

         - name: Upload Test Results
           uses: actions/upload-artifact@v7
           with:
             name: Edge_Windows_Report
             path: "test-output/reports/*.html"